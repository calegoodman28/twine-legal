<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        h1 {
            font-size: 48px;
            color: #38BC89;
            margin-bottom: 12px;
        }
        p {
            font-size: 18px;
            color: #888;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        a {
            color: #38BC89;
            text-decoration: none;
            font-size: 16px;
            padding: 14px 24px;
            border: 1px solid #38BC89;
            border-radius: 12px;
            transition: all 0.2s;
        }
        a:hover {
            background: #38BC89;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Twine" style="max-width: 280px; margin-bottom: 16px;">
        <p>Your friends, with mine.</p>
        <div class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html">Terms of Service</a>
        </div>
    </div>
</body>
</html>
